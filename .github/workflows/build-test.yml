name: CI Build & Test

on:
  push:
    branches: ['**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Lint frontend
        run: npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Run API tests
        run: |
          cd api
          python -m pytest

      - name: Build Docker images
        run: |
          docker build -t octocat-api:test ./api
          docker build -t octocat-frontend:test ./frontend
