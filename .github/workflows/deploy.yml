name: Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-api:
    runs-on: ubuntu-latest
    outputs:
      imageTag: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: pip install -r api/requirements.txt

      - name: Run API tests
        run: |
          cd api
          python -m pytest

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build API Docker image
        run: |
          docker build -t ${{ vars.AZURE_ACR_NAME }}.azurecr.io/octocat-scm-api:${{ steps.sha.outputs.short }} ./api

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Push API image to ACR
        run: |
          docker push ${{ vars.AZURE_ACR_NAME }}.azurecr.io/octocat-scm-api:${{ steps.sha.outputs.short }}

  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      imageTag: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Lint frontend
        run: npm run lint

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build Frontend Docker image
        run: |
          docker build -t ${{ vars.AZURE_ACR_NAME }}.azurecr.io/octocat-scm-frontend:${{ steps.sha.outputs.short }} ./frontend

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Push Frontend image to ACR
        run: |
          docker push ${{ vars.AZURE_ACR_NAME }}.azurecr.io/octocat-scm-frontend:${{ steps.sha.outputs.short }}

  deploy-staging:
    needs: [build-api, build-frontend]
    runs-on: ubuntu-latest
    outputs:
      imageTag: ${{ needs.build-api.outputs.imageTag }}
    environment:
      name: Staging
      url: ${{ steps.deploy.outputs.frontendUrl }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Staging
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            infra/parameters/staging.parameters.json
            acrName=${{ vars.AZURE_ACR_NAME }}
            imageTag=${{ needs.build-api.outputs.imageTag }}
            acrResourceGroup=${{ vars.AZURE_RESOURCE_GROUP_PROD }}

  deploy-prod:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.frontendUrl }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Production
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
          template: infra/main.bicep
          parameters: >
            infra/parameters/production.parameters.json
            acrName=${{ vars.AZURE_ACR_NAME }}
            imageTag=${{ needs.deploy-staging.outputs.imageTag }}
            acrResourceGroup=${{ vars.AZURE_RESOURCE_GROUP_PROD }}
